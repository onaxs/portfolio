<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Xano Sweeting | Portfolio</title>
  <style>
    /* ── Reset & base ──────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --fg: #111;
      --bg: #fff;
      --muted: #666;
      --border: #ddd;
      --link: #111;
      --toc-width: 220px;
      --main-max: 1100px;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      --mono: 'Courier New', Courier, monospace;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font);
      font-size: 15px;
      line-height: 1.7;
      color: var(--fg);
      background: var(--bg);
    }

    a { color: var(--link); }
    a:hover { text-decoration: underline; }

    img { max-width: 100%; height: auto; border-radius: 4px; margin: 16px 0; display: block; }
    model-viewer { width: 100%; height: 480px; margin: 16px 0; border-radius: 4px; }

    h1 { font-size: 1.6rem; margin: 2.5rem 0 1rem; }
    h2 { font-size: 1.25rem; margin: 2rem 0 0.75rem; }
    h3 { font-size: 1.05rem; margin: 1.5rem 0 0.5rem; }
    h4 { font-size: 0.95rem; margin: 1.2rem 0 0.4rem; }
    p  { margin-bottom: 0.85rem; }
    ul, ol { padding-left: 1.5rem; margin-bottom: 0.85rem; }
    code { font-family: var(--mono); background: #f4f4f4; padding: 1px 5px; border-radius: 3px; font-size: 0.9em; }
    pre  { background: #f4f4f4; padding: 14px; border-radius: 4px; overflow-x: auto; }
    hr   { border: none; border-top: 1px solid var(--border); margin: 2rem 0; }

    /* ── Layout ────────────────────────────────────────────────────────── */
    #toc-sidebar {
      display: none;
      position: fixed;
      left: 12px;
      top: 48px;
      width: calc(50% - var(--main-max) / 2 - 20px);
      max-height: calc(100vh - 60px);
      overflow-y: auto;
      z-index: 40;
    }

    @media (min-width: 1440px) {
      #toc-sidebar { display: block; }
      #toc-mobile  { display: none; }
    }

    main {
      max-width: var(--main-max);
      margin: 0 auto;
      padding: 20px 24px 120px;
    }

    /* ── Mobile TOC ────────────────────────────────────────────────────── */
    #toc-mobile {
      position: fixed;
      left: 8px;
      top: 8px;
      z-index: 50;
    }

    #toc-btn {
      font-family: var(--font);
      font-size: 1rem;
      background: var(--bg);
      border: 1px solid var(--fg);
      padding: 2px 8px;
      cursor: pointer;
      box-shadow: 2px 2px 0 var(--fg);
    }

    #toc-dropdown {
      position: absolute;
      left: 0;
      top: calc(100% + 4px);
      background: var(--bg);
      border: 1px solid var(--fg);
      box-shadow: 3px 3px 0 rgba(0,0,0,0.4);
      padding: 8px 12px;
      min-width: 200px;
      max-height: 70vh;
      overflow-y: auto;
    }

    /* ── TOC tree ──────────────────────────────────────────────────────── */
    .toc-tree {
      font-family: var(--mono);
      font-size: 1.05rem;
      font-weight: 600;
      line-height: 1.7;
      user-select: none;
    }

    .toc-tree a,
    .toc-tree button,
    .toc-tree span {
      display: block;
      text-decoration: none;
      color: var(--fg);
      background: none;
      border: none;
      font-family: var(--mono);
      font-size: inherit;
      font-weight: inherit;
      line-height: inherit;
      cursor: pointer;
      padding: 0;
      text-align: left;
      white-space: pre;
    }

    .toc-tree a:hover,
    .toc-tree button:hover { text-decoration: underline; }

    .toc-children {
      padding-left: 0;
    }

    .toc-node { list-style: none; }

    /* ── Sections ──────────────────────────────────────────────────────── */
    .section-block { margin-bottom: 32px; }
    #section-about { margin-top: 0; }

    .section-title {
      font-size: 1.8rem;
      font-weight: 700;
      border-bottom: 2px solid var(--fg);
      padding-bottom: 8px;
      margin-bottom: 24px;
    }

    /* ── Thumbnail strip ───────────────────────────────────────────────── */
    .thumbnail-strip {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 10px;
      margin-bottom: 12px;
    }

    .thumb-card {
      cursor: pointer;
      text-decoration: none;
      color: var(--fg);
      display: flex;
      flex-direction: column;
    }

    .thumb-card:hover .thumb-img-wrap { outline: 2px solid var(--fg); }

    .thumb-img-wrap {
      aspect-ratio: 4/3;
      overflow: hidden;
      background: #f0f0f0;
      border-radius: 3px;
    }

    .thumb-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      margin: 0;
      border-radius: 0;
    }

    .thumb-placeholder {
      width: 100%;
      height: 100%;
      background: #e8e8e8;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--muted);
    }

    .thumb-label {
      font-size: 0.72rem;
      line-height: 1.3;
      margin-top: 5px;
      color: var(--muted);
    }

    .thumb-label strong {
      color: var(--fg);
      display: block;
      font-size: 0.78rem;
    }

    .strip-toggle-btn {
      margin-bottom: 32px;
      font-family: var(--font);
      font-size: 0.82rem;
      background: none;
      border: 1px solid var(--border);
      padding: 4px 12px;
      cursor: pointer;
      border-radius: 3px;
      color: var(--muted);
    }

    .strip-toggle-btn:hover { border-color: var(--fg); color: var(--fg); }

    /* ── Page title ────────────────────────────────────────────────────── */
    .page-title {
      font-family: var(--font);
      font-size: 2.2rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    /* ── Fieldset boxes ─────────────────────────────────────────────────── */
    .box {
      border: 1px solid var(--fg);
      padding: 20px 20px 16px;
      box-shadow: 3px 3px 0 var(--fg);
    }

    .box legend {
      font-family: var(--mono);
      font-style: italic;
      font-size: 1rem;
      font-weight: 700;
      color: var(--fg);
      padding: 0 8px;
      margin-left: 4px;
    }

    /* ── Strip groups (thumbnail overview) ────────────────────────────── */
    .strip-group {
      margin-bottom: 20px;
    }

    /* ── Tag groups ────────────────────────────────────────────────────── */
    .tag-group { margin-bottom: 48px; }

    .tag-group-title {
      font-family: var(--font);
      font-size: 0.85rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      border-bottom: 1px solid var(--border);
      padding-bottom: 4px;
      margin-bottom: 20px;
    }

    /* ── Image gallery ─────────────────────────────────────────────────── */
    .img-gallery {
      margin-bottom: 2rem;
    }
    .img-gallery summary {
      cursor: pointer;
      font-family: var(--mono);
      font-size: 0.95rem;
      font-weight: 700;
      padding: 6px 10px;
      border: 1px solid var(--border);
      border-radius: 4px;
      user-select: none;
      list-style: none;
    }
    .img-gallery summary::-webkit-details-marker { display: none; }
    .img-gallery[open] summary { border-bottom-left-radius: 0; border-bottom-right-radius: 0; border-bottom: none; }
    .img-gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 8px;
      padding: 10px;
      border: 1px solid var(--border);
      border-top: none;
      border-radius: 0 0 4px 4px;
    }
    .img-gallery-grid .thumb {
      display: block;
      overflow: hidden;
      border-radius: 3px;
      aspect-ratio: 4/3;
      cursor: zoom-in;
    }
    .img-gallery-grid img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: opacity 0.15s;
    }
    .img-gallery-grid .thumb:hover img { opacity: 0.85; }

    /* ── Lightbox ───────────────────────────────────────────────────────── */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.88);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      cursor: zoom-out;
    }
    #lightbox.open { display: flex; }
    #lightbox img {
      max-width: 92vw;
      max-height: 92vh;
      object-fit: contain;
      border-radius: 4px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6);
      cursor: default;
    }
    #lightbox-close {
      position: fixed;
      top: 16px;
      right: 20px;
      font-size: 1.8rem;
      color: #fff;
      cursor: pointer;
      line-height: 1;
      opacity: 0.8;
    }
    #lightbox-close:hover { opacity: 1; }

    /* ── Project entries ───────────────────────────────────────────────── */
    .project-entry {
      margin-bottom: 32px;
      scroll-margin-top: 20px;
    }

    .section-block { scroll-margin-top: 20px; }
    .tag-group      { scroll-margin-top: 20px; }

    .project-meta {
      display: flex;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 4px;
      flex-wrap: wrap;
    }

    .project-meta-date {
      font-family: var(--font);
      font-size: 0.78rem;
      color: var(--muted);
    }

    .project-meta-tags {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .tag-pill {
      font-family: var(--font);
      font-size: 0.72rem;
      background: #f0f0f0;
      padding: 1px 7px;
      border-radius: 10px;
      color: var(--muted);
    }

    .project-body { margin-top: 16px; }

    .project-body-loading {
      color: var(--muted);
      font-family: var(--font);
      font-size: 0.85rem;
      padding: 12px 0;
    }

    /* ── Project card (main page listing) ─────────────────────────────── */
    .project-card {
      display: block;
      text-decoration: none;
      color: var(--fg);
      margin-bottom: 16px;
    }

    .project-card:hover .box { box-shadow: 5px 5px 0 var(--fg); }
    .project-card:hover { text-decoration: none; }

    .project-card .box { transition: box-shadow 0.1s; }

    .project-card-title {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 4px;
    }

    /* ── Project detail page ───────────────────────────────────────────── */
    #project-page { min-height: 100vh; }

    #project-page-inner {
      max-width: var(--main-max);
      margin: 0 auto;
      padding: 20px 24px 120px;
    }

    #back-btn {
      display: inline-block;
      font-family: var(--font);
      font-size: 0.85rem;
      text-decoration: none;
      color: var(--muted);
      margin-bottom: 32px;
      border: 1px solid var(--border);
      padding: 3px 10px;
    }

    #back-btn:hover { color: var(--fg); border-color: var(--fg); text-decoration: none; }

    /* ── Page header (title + buttons) ────────────────────────────────── */
    #page-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 6px;
    }

    /* ── Top-right buttons ─────────────────────────────────────────────── */
    #top-right {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    .top-btn {
      font-family: var(--font);
      font-size: 0.8rem;
      text-decoration: none;
      color: var(--fg);
      border: 1px solid var(--fg);
      padding: 3px 10px;
      background: var(--bg);
      box-shadow: 2px 2px 0 var(--fg);
      cursor: pointer;
      white-space: nowrap;
    }

    .top-btn:hover {
      background: var(--fg);
      color: var(--bg);
      text-decoration: none;
    }
  </style>
</head>
<body>

  <!-- Sidebar TOC (wide screens) -->
  <nav id="toc-sidebar"></nav>

  <!-- Mobile TOC -->
  <div id="toc-mobile">
    <button id="toc-btn" aria-label="Toggle navigation">~/</button>
    <div id="toc-dropdown" hidden></div>
  </div>

  <!-- Main page -->
  <main id="main-page">
    <div id="page-header">
      <h1 class="page-title">Xano Sweeting</h1>
      <div id="top-right">
        <a class="top-btn" href="https://www.linkedin.com/in/xano-s-76962b211/" target="_blank" rel="noopener">LinkedIn</a>
        <a class="top-btn" href="resume.pdf" target="_blank">Resume</a>
      </div>
    </div>

    <section class="section-block" id="section-about">
      <fieldset class="box">
        <legend>cat README.md</legend>
        <div id="about-body"></div>
      </fieldset>
    </section>

    <section class="section-block" id="section-thumbnails">
      <fieldset class="box strip-group">
        <legend>ls ~/projects/</legend>
        <div class="thumbnail-strip" id="strip-project"></div>
        <button class="strip-toggle-btn" id="strip-toggle-project" hidden></button>
      </fieldset>
      <fieldset class="box strip-group">
        <legend>ls ~/mini-projects/</legend>
        <div class="thumbnail-strip" id="strip-mini-project"></div>
        <button class="strip-toggle-btn" id="strip-toggle-mini-project" hidden></button>
      </fieldset>
      <fieldset class="box strip-group">
        <legend>ls ~/adventures/</legend>
        <div class="thumbnail-strip" id="strip-adventure"></div>
        <button class="strip-toggle-btn" id="strip-toggle-adventure" hidden></button>
      </fieldset>
    </section>

    <section class="section-block" id="section-project">
      <h1 class="section-title">Projects</h1>
      <div id="content-project"></div>
    </section>

    <section class="section-block" id="section-mini-project">
      <h1 class="section-title">Mini Projects</h1>
      <div id="content-mini-project"></div>
    </section>

    <section class="section-block" id="section-adventure">
      <h1 class="section-title">Adventures</h1>
      <div id="content-adventure"></div>
    </section>
  </main>

  <!-- Lightbox -->
  <div id="lightbox">
    <span id="lightbox-close">✕</span>
    <img id="lightbox-img" src="" alt="">
  </div>

  <!-- Project detail page -->
  <div id="project-page" hidden>
    <main id="project-page-inner">
      <a id="back-btn" href="#">← back</a>
      <div id="project-page-body"></div>
    </main>
  </div>

<script>
'use strict';

const STRIP_DEFAULT = 6;


function formatDate(ds) {
  if (!ds) return '';
  if (ds === 'present') return 'present';
  const [year, month] = ds.split('-');
  if (month) {
    const m = new Date(+year, +month - 1).toLocaleString('en-US', { month: 'short' });
    return `${m} ${year}`;
  }
  return year;
}

function dateRange(project) {
  const s = formatDate(project.date_start);
  const e = formatDate(project.date_end);
  if (!s && !e) return '';
  if (!e || s === e) return s;
  return `${s} – ${e}`;
}

// ── TOC building ───────────────────────────────────────────────────────────

function buildTOCTree(data, prefix) {
  const root = document.createElement('div');
  root.className = 'toc-tree';

  // ~/
  const rootLine = document.createElement('span');
  rootLine.textContent = '~/';
  root.appendChild(rootLine);

  const sections = [
    { key: 'about',        label: 'about.md',       href: '#section-about', children: null },
    { key: 'project',      label: 'projects/',       href: '#section-project' },
    { key: 'mini-project', label: 'mini-projects/',  href: '#section-mini-project' },
    { key: 'adventure',    label: 'adventures/',     href: '#section-adventure' },
  ];

  sections.forEach((sec, si) => {
    const isLast = si === sections.length - 1;
    const prefix1 = isLast ? '└── ' : '├── ';

    if (sec.key === 'about') {
      const a = document.createElement('a');
      a.href = sec.href;
      a.textContent = prefix1 + sec.label;
      root.appendChild(a);
      return;
    }

    const sectionData = data[sec.key];
    if (!sectionData) {
      // section exists in HTML but no data yet
      const a = document.createElement('a');
      a.href = sec.href;
      a.textContent = prefix1 + sec.label;
      root.appendChild(a);
      return;
    }

    // Section node — expandable
    const { tag_order, groups } = sectionData;

    const sectionNode = makeCollapsible(prefix1 + sec.label, sec.href, prefix + '-' + sec.key);
    const children = sectionNode.querySelector('.toc-children');

    const visibleTags = tag_order.filter(t => groups[t] && groups[t].length > 0);

    visibleTags.forEach((tag, ti) => {
      const tagProjects = groups[tag];
      const tagIsLast = ti === visibleTags.length - 1;
      const prefix2 = tagIsLast ? '    └── ' : '    ├── ';

      const tagNode = makeCollapsible(prefix2 + tag + '/', `#tag-${sec.key}-${tag}`, prefix + '-' + sec.key + '-' + tag);
      const tagChildren = tagNode.querySelector('.toc-children');

      tagProjects.forEach((proj, pi) => {
        const projIsLast = pi === tagProjects.length - 1;
        const prefix3 = tagIsLast
          ? (projIsLast ? '        └── ' : '        ├── ')
          : (projIsLast ? '    │   └── ' : '    │   ├── ');

        if (proj.headings && proj.headings.length > 0) {
          const projNode = makeCollapsible(prefix3 + proj.title, `#project-${proj.slug}`, prefix + '-' + proj.slug);
          const projChildren = projNode.querySelector('.toc-children');

          proj.headings.forEach((h, hi) => {
            const hIsLast = hi === proj.headings.length - 1;
            const prefix4 = projIsLast
              ? (hIsLast ? '            └── ' : '            ├── ')
              : (hIsLast ? '    │       └── ' : '    │       ├── ');
            const ha = document.createElement('a');
            ha.href = `#${h.anchor}`;
            ha.textContent = prefix4 + '## ' + h.text;
            projChildren.appendChild(ha);
          });

          tagChildren.appendChild(projNode);
        } else {
          const pa = document.createElement('a');
          pa.href = `#project-${proj.slug}`;
          pa.textContent = prefix3 + proj.title;
          tagChildren.appendChild(pa);
        }
      });

      children.appendChild(tagNode);
    });

    root.appendChild(sectionNode);
  });

  return root;
}

function makeCollapsible(label, href, id) {
  const wrap = document.createElement('div');

  const summary = document.createElement('button');
  summary.id = `toc-node-${id}`;
  summary.textContent = label;
  summary.setAttribute('aria-expanded', 'false');

  const children = document.createElement('div');
  children.className = 'toc-children';
  children.hidden = true;

  summary.addEventListener('click', (e) => {
    e.stopPropagation();
    const expanded = children.hidden;
    children.hidden = !expanded;
    summary.setAttribute('aria-expanded', String(expanded));
    const target = document.querySelector(href);
    if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
  });

  wrap.appendChild(summary);
  wrap.appendChild(children);
  return wrap;
}

// ── Thumbnail strip ────────────────────────────────────────────────────────

function renderStrip(sectionKey, strip) {
  const container = document.getElementById(`strip-${sectionKey}`);
  const toggleBtn  = document.getElementById(`strip-toggle-${sectionKey}`);
  if (!container || !strip || strip.length === 0) return;

  strip.forEach((proj, i) => {
    const card = document.createElement('a');
    card.className = 'thumb-card';
    card.href = `#${proj.slug}`;

    const imgWrap = document.createElement('div');
    imgWrap.className = 'thumb-img-wrap';

    if (proj.thumbnail) {
      const img = document.createElement('img');
      img.src = proj.thumbnail;
      img.alt = proj.title;
      img.loading = 'lazy';
      imgWrap.appendChild(img);
    } else {
      const ph = document.createElement('div');
      ph.className = 'thumb-placeholder';
      ph.textContent = proj.title.substring(0, 12);
      imgWrap.appendChild(ph);
    }

    const label = document.createElement('div');
    label.className = 'thumb-label';
    label.innerHTML = `<strong>${proj.title}</strong>${proj.caption || ''}`;

    card.appendChild(imgWrap);
    card.appendChild(label);
    container.appendChild(card);

    if (i >= STRIP_DEFAULT) card.dataset.overflow = 'true';
  });

  // Apply collapsed state
  if (strip.length > STRIP_DEFAULT) {
    applyStripCollapse(container, true);
    toggleBtn.hidden = false;
    toggleBtn.dataset.collapsed = 'true';
    toggleBtn.textContent = `Show all ${strip.length} →`;

    toggleBtn.addEventListener('click', () => {
      const collapsed = toggleBtn.dataset.collapsed === 'true';
      applyStripCollapse(container, !collapsed);
      toggleBtn.dataset.collapsed = String(!collapsed);
      toggleBtn.textContent = collapsed
        ? `Show fewer ←`
        : `Show all ${strip.length} →`;
    });
  }
}

function applyStripCollapse(container, collapse) {
  container.querySelectorAll('[data-overflow]').forEach(el => {
    el.style.display = collapse ? 'none' : '';
  });
}

// ── Section / project rendering ────────────────────────────────────────────

function renderSection(sectionKey, sectionData) {
  const container = document.getElementById(`content-${sectionKey}`);
  if (!container || !sectionData) return;

  const { tag_order, groups } = sectionData;
  const visibleTags = tag_order.filter(t => groups[t] && groups[t].length > 0);

  visibleTags.forEach(tag => {
    const tagDiv = document.createElement('div');
    tagDiv.className = 'tag-group';
    tagDiv.id = `tag-${sectionKey}-${tag}`;

    const tagTitle = document.createElement('div');
    tagTitle.className = 'tag-group-title';
    tagTitle.textContent = tag.replace(/_/g, ' ');
    tagDiv.appendChild(tagTitle);

    groups[tag].forEach(proj => {
      tagDiv.appendChild(buildProjectElement(proj));
    });

    container.appendChild(tagDiv);
  });
}

// Simple card for main page listing — clicking navigates to project page
function buildProjectElement(project) {
  const card = document.createElement('a');
  card.className = 'project-card';
  card.href = `#${project.slug}`;
  card.id = `project-${project.slug}`;

  const fs = document.createElement('fieldset');
  fs.className = 'box project-entry';

  const legend = document.createElement('legend');
  legend.textContent = `cat ${project.slug}/index.md`;
  fs.appendChild(legend);

  const title = document.createElement('div');
  title.className = 'project-card-title';
  title.textContent = project.title;
  fs.appendChild(title);

  const meta = document.createElement('div');
  meta.className = 'project-meta';

  const dateEl = document.createElement('span');
  dateEl.className = 'project-meta-date';
  dateEl.textContent = dateRange(project);
  meta.appendChild(dateEl);

  if (project.employer) {
    const emp = document.createElement('span');
    emp.className = 'project-meta-date';
    emp.textContent = project.employer;
    meta.appendChild(emp);
  }

  const tagsEl = document.createElement('div');
  tagsEl.className = 'project-meta-tags';
  (project.tags || []).forEach(t => {
    const pill = document.createElement('span');
    pill.className = 'tag-pill';
    pill.textContent = t.replace(/_/g, ' ');
    tagsEl.appendChild(pill);
  });
  meta.appendChild(tagsEl);
  fs.appendChild(meta);

  card.appendChild(fs);
  return card;
}

// ── Project detail page ────────────────────────────────────────────────────

let _allProjects = []; // flat list, populated after init

async function showProjectPage(slug) {
  const project = _allProjects.find(p => p.slug === slug);
  if (!project) { showMainPage(); return; }

  // Fetch pre-rendered HTML fragment
  let html = '<p><em>Content coming soon.</em></p>';
  try {
    html = await fetch(`content/${slug}/index.html`).then(r => r.text());
  } catch {}

  const body = document.getElementById('project-page-body');
  body.innerHTML = '';

  // Prepend image gallery if images exist
  if (project.images && project.images.length > 0) {
    const gallery = document.createElement('details');
    gallery.className = 'img-gallery';
    const summary = document.createElement('summary');
    summary.textContent = `▶ gallery (${project.images.length})`;
    gallery.appendChild(summary);
    const grid = document.createElement('div');
    grid.className = 'img-gallery-grid';
    project.images.forEach(src => {
      const thumb = document.createElement('div');
      thumb.className = 'thumb';
      thumb.title = src.split('/').pop();
      const img = document.createElement('img');
      img.src = src;
      img.alt = src.split('/').pop();
      img.loading = 'lazy';
      thumb.addEventListener('click', () => openLightbox(src));
      thumb.appendChild(img);
      grid.appendChild(thumb);
    });
    gallery.appendChild(grid);
    body.appendChild(gallery);
  }

  body.insertAdjacentHTML('beforeend', html);

  // Swap visible pages
  document.getElementById('main-page').hidden = true;
  document.getElementById('project-page').hidden = false;

  // Build project TOC from heading anchors
  buildProjectTOC(project);

  // Scroll to heading anchor if present, otherwise scroll to top
  const hash = window.location.hash.slice(1);
  if (hash && hash !== slug) {
    requestAnimationFrame(() => {
      const el = document.getElementById(hash);
      if (el) el.scrollIntoView({ behavior: 'smooth' });
      else window.scrollTo(0, 0);
    });
  } else {
    window.scrollTo(0, 0);
  }
}

function showMainPage() {
  document.getElementById('project-page').hidden = true;
  document.getElementById('main-page').hidden = false;
  buildMainTOC();
  window.scrollTo(0, 0);
}

// ── TOC variants ───────────────────────────────────────────────────────────

let _data = null;

function buildMainTOC() {
  ['toc-sidebar', 'toc-dropdown'].forEach((id, i) => {
    const el = document.getElementById(id);
    el.innerHTML = '';
    el.appendChild(buildTOCTree(_data, i === 0 ? 'sb' : 'mb'));
  });
}

function buildProjectTOC(project) {
  const prefix = project.slug;
  ['toc-sidebar', 'toc-dropdown'].forEach(id => {
    const el = document.getElementById(id);
    el.innerHTML = '';
    const tree = document.createElement('div');
    tree.className = 'toc-tree';

    const backLine = document.createElement('a');
    backLine.href = '#';
    backLine.textContent = '← ~/';
    tree.appendChild(backLine);

    const titleLine = document.createElement('span');
    titleLine.textContent = project.slug + '/';
    tree.appendChild(titleLine);

    (project.headings || []).forEach((h, i) => {
      const isLast = i === project.headings.length - 1;
      const a = document.createElement('a');
      a.href = `#${h.anchor}`;
      a.textContent = (isLast ? '└── ' : '├── ') + '## ' + h.text;
      tree.appendChild(a);
    });

    el.appendChild(tree);
  });
}

// ── Router ─────────────────────────────────────────────────────────────────

function router() {
  const hash = window.location.hash.slice(1);

  // Empty hash → main page
  if (!hash) { showMainPage(); return; }

  // Exact slug match → project page
  if (_allProjects.find(p => p.slug === hash)) {
    showProjectPage(hash); return;
  }

  // Heading anchor (e.g. fsae-battery-module-design) — load project page if needed
  const matchedProject = _allProjects.find(p => hash.startsWith(p.slug + '-'));
  if (matchedProject) {
    if (document.getElementById('project-page').hidden) {
      showProjectPage(matchedProject.slug);
    }
    return;
  }

  // Main-page section/tag anchors → main page
  showMainPage();
}

// ── Boot ───────────────────────────────────────────────────────────────────

async function init() {
  fetch('about.html')
    .then(r => r.text())
    .then(html => { document.getElementById('about-body').innerHTML = html; });

  _data = await fetch('projects.json').then(r => r.json());

  // Flatten all projects for lookup
  Object.values(_data).forEach(section => {
    Object.values(section.groups).forEach(group => {
      group.forEach(p => { if (!_allProjects.find(x => x.slug === p.slug)) _allProjects.push(p); });
    });
  });

  // Render main page
  const sectionOrder = ['project', 'mini-project', 'adventure'];
  sectionOrder.forEach(key => {
    if (_data[key]) {
      renderStrip(key, _data[key].thumbnail_strip);
      renderSection(key, _data[key]);
    }
  });

  buildMainTOC();
  window.addEventListener('hashchange', router);
  router();
}

// ── Lightbox ──────────────────────────────────────────────────────────────────
function openLightbox(src) {
  const lb = document.getElementById('lightbox');
  document.getElementById('lightbox-img').src = src;
  lb.classList.add('open');
}
function closeLightbox() {
  const lb = document.getElementById('lightbox');
  lb.classList.remove('open');
  document.getElementById('lightbox-img').src = '';
}
document.getElementById('lightbox').addEventListener('click', e => {
  if (e.target !== document.getElementById('lightbox-img')) closeLightbox();
});
document.getElementById('lightbox-close').addEventListener('click', closeLightbox);
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

// Mobile TOC toggle
document.getElementById('toc-btn').addEventListener('click', e => {
  e.stopPropagation();
  const menu = document.getElementById('toc-dropdown');
  menu.hidden = !menu.hidden;
});

document.addEventListener('click', e => {
  const menu = document.getElementById('toc-dropdown');
  const btn  = document.getElementById('toc-btn');
  if (!menu.hidden && !menu.contains(e.target) && e.target !== btn) {
    menu.hidden = true;
  }
});

init();
</script>
